<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 340px;
      background: #fafafa;
      color: #1a1a1a;
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      font-size: 13px;
      font-weight: 400;
      line-height: 1.45;
      padding: 16px 16px 18px;
      -webkit-font-smoothing: antialiased;
    }
    h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #111;
      margin-bottom: 2px;
    }
    .subtitle {
      font-size: 12px;
      color: #737373;
      margin-bottom: 18px;
      font-weight: 400;
    }
    .section { margin-bottom: 16px; }
    .section-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }
    label {
      font-size: 11px;
      font-weight: 500;
      color: #525252;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .tag-container {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
      min-height: 26px;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 9px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid transparent;
    }
    .tag-interest {
      background: #f0f0f0;
      border-color: #e5e5e5;
      color: #262626;
    }
    .tag-toxic {
      background: #f5f5f5;
      border-color: #e5e5e5;
      color: #404040;
    }
    .tag-interest { border-left: 3px solid #a3a3a3; }
    .tag-toxic { border-left: 3px solid #d4d4d4; }
    .tag button {
      background: none;
      border: none;
      color: #737373;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 0 0 0 2px;
    }
    .tag button:hover { color: #171717; }
    .input-row { display: flex; gap: 6px; }
    input {
      flex: 1;
      background: #fff;
      border: 1px solid #e5e5e5;
      color: #171717;
      padding: 8px 10px;
      border-radius: 6px;
      font-family: inherit;
      font-size: 12px;
      outline: none;
    }
    input::placeholder { color: #a3a3a3; }
    input:focus { border-color: #a3a3a3; }
    .btn {
      padding: 8px 12px;
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      background: #fff;
      color: #262626;
    }
    .btn:hover { background: #f5f5f5; border-color: #d4d4d4; }
    .btn-add-interest { min-width: 36px; }
    .btn-add-toxic { min-width: 36px; }
    .status {
      font-size: 11px;
      color: #a3a3a3;
      margin-top: 12px;
      text-align: center;
      min-height: 16px;
    }
    .status.ok { color: #525252; }
    .status.err { color: #737373; }
    .divider {
      border: none;
      border-top: 1px solid #e5e5e5;
      margin: 14px 0;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 0;
    }
    .toggle-label { font-size: 12px; color: #404040; }
    .toggle { position: relative; width: 40px; height: 22px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #e5e5e5;
      border-radius: 22px;
      transition: 0.2s;
    }
    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 1px 2px rgba(0,0,0,0.08);
      transition: 0.2s;
    }
    .toggle input:checked + .toggle-slider { background: #d4d4d4; }
    .toggle input:checked + .toggle-slider:before {
      transform: translateX(18px);
    }
  </style>
</head>
<body>
  <h1>FixMyFeed</h1>
  <p class="subtitle">Feed preferences</p>

  <div id="lock-banner" style="display:none;background:rgba(255,107,53,0.1);border:1px solid rgba(255,107,53,0.3);border-radius:6px;padding:8px 12px;margin-bottom:14px;text-align:center;">
    <span style="color:#ff6b35;font-size:11px;letter-spacing:1px;text-transform:uppercase;">🔒 Parental lock active — settings controlled by parent</span>
  </div>

  <div class="section">
    <div class="section-header">
      <label>Interests</label>
    </div>
    <div class="tag-container" id="interest-tags"></div>
    <div class="input-row">
      <input type="text" id="interest-input" placeholder="Add interest…" autocomplete="off">
      <button type="button" class="btn btn-add-interest" id="interest-add" aria-label="Add interest">+</button>
    </div>
  </div>

  <hr class="divider">

  <div class="section">
    <div class="section-header">
      <label>Filter keywords</label>
    </div>
    <div class="tag-container" id="toxic-tags"></div>
    <div class="input-row">
      <input type="text" id="toxic-input" placeholder="Add keyword…" autocomplete="off">
      <button type="button" class="btn btn-add-toxic" id="toxic-add" aria-label="Add keyword">+</button>
    </div>
  </div>

  <hr class="divider">

  <div class="section">
    <div class="toggle-row">
      <span class="toggle-label">Auto-like matches</span>
      <label class="toggle">
        <input type="checkbox" id="autolike-toggle">
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>

  <div class="status" id="status"></div>

  <hr class="divider">

  <div style="text-align:center;padding:4px 0 2px;">
    <span style="font-size:10px;color:#333;letter-spacing:1px;text-transform:uppercase;">User ID</span><br>
    <span id="user-id-display" style="font-size:10px;color:#444;font-family:inherit;word-break:break-all;"></span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
