<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 380px;
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
      font-size: 13px;
      padding: 20px;
    }
    h1 {
      font-size: 16px;
      color: #39ff14;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 11px;
      color: #555;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }
    .section {
      margin-bottom: 18px;
    }
    .section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .section-header .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .dot-green { background: #39ff14; }
    .dot-red { background: #ff3939; }
    label {
      font-size: 12px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .tag-container {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
      min-height: 28px;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-family: inherit;
    }
    .tag-interest {
      background: rgba(57, 255, 20, 0.12);
      border: 1px solid rgba(57, 255, 20, 0.3);
      color: #39ff14;
    }
    .tag-toxic {
      background: rgba(255, 57, 57, 0.12);
      border: 1px solid rgba(255, 57, 57, 0.3);
      color: #ff3939;
    }
    .tag button {
      background: none;
      border: none;
      color: inherit;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      opacity: 0.6;
      padding: 0;
    }
    .tag button:hover {
      opacity: 1;
    }
    .input-row {
      display: flex;
      gap: 6px;
    }
    input {
      flex: 1;
      background: #141414;
      border: 1px solid #2a2a2a;
      color: #e0e0e0;
      padding: 8px 10px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 12px;
      outline: none;
    }
    input:focus {
      border-color: #39ff14;
    }
    input.toxic-input:focus {
      border-color: #ff3939;
    }
    .btn {
      padding: 8px 14px;
      border: none;
      border-radius: 4px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: bold;
    }
    .btn-green {
      background: #39ff14;
      color: #0a0a0a;
    }
    .btn-green:hover {
      background: #2ecc0f;
    }
    .btn-red {
      background: #ff3939;
      color: #0a0a0a;
    }
    .btn-red:hover {
      background: #e02e2e;
    }
    .status {
      font-size: 11px;
      color: #555;
      margin-top: 14px;
      text-align: center;
      min-height: 16px;
      transition: color 0.2s;
    }
    .status.ok {
      color: #39ff14;
    }
    .status.err {
      color: #ff3939;
    }
    .divider {
      border: none;
      border-top: 1px solid #1a1a1a;
      margin: 16px 0;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
    }
    .toggle-label {
      font-size: 12px;
      color: #aaa;
    }
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #2a2a2a;
      border-radius: 24px;
      transition: 0.2s;
    }
    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background: #666;
      border-radius: 50%;
      transition: 0.2s;
    }
    .toggle input:checked + .toggle-slider {
      background: rgba(57, 255, 20, 0.3);
    }
    .toggle input:checked + .toggle-slider:before {
      transform: translateX(20px);
      background: #39ff14;
    }
  </style>
</head>
<body>
  <h1>Shadow-Scroll</h1>
  <p class="subtitle">anti-algorithmic filter</p>

  <div id="lock-banner" style="display:none;background:rgba(255,107,53,0.1);border:1px solid rgba(255,107,53,0.3);border-radius:6px;padding:8px 12px;margin-bottom:14px;text-align:center;">
    <span style="color:#ff6b35;font-size:11px;letter-spacing:1px;text-transform:uppercase;">🔒 Parental lock active — settings controlled by parent</span>
  </div>

  <div class="section">
    <div class="section-header">
      <span class="dot dot-green"></span>
      <label>Interests (+10 each)</label>
    </div>
    <div class="tag-container" id="interest-tags"></div>
    <div class="input-row">
      <input type="text" id="interest-input" placeholder="add interest...">
      <button class="btn btn-green" id="interest-add">+</button>
    </div>
  </div>

  <hr class="divider">

  <div class="section">
    <div class="section-header">
      <span class="dot dot-red"></span>
      <label>Toxic keywords (-5 each)</label>
    </div>
    <div class="tag-container" id="toxic-tags"></div>
    <div class="input-row">
      <input type="text" id="toxic-input" class="toxic-input" placeholder="add toxic keyword...">
      <button class="btn btn-red" id="toxic-add">+</button>
    </div>
  </div>

  <hr class="divider">

  <div class="section">
    <div class="toggle-row">
      <span class="toggle-label">Auto-like matching content</span>
      <label class="toggle">
        <input type="checkbox" id="autolike-toggle">
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>

  <div class="status" id="status"></div>

  <hr class="divider">

  <div style="text-align:center;padding:4px 0 2px;">
    <span style="font-size:10px;color:#333;letter-spacing:1px;text-transform:uppercase;">User ID</span><br>
    <span id="user-id-display" style="font-size:10px;color:#444;font-family:inherit;word-break:break-all;"></span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
